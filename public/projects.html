<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — CollabX</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <a href="/projects.html" style="color:var(--red)">Projects</a>
    <a href="/create-project.html">Create Project</a>
  </div>
  <a href="/" class="nav-logo"><img src="/logo.jpeg" alt="CollabX" class="nav-logo-img"></a>
  <div class="nav-right">
    <a href="/messages.html" class="auth-only" style="font-weight:700">Messages</a>
    <a href="/login.html" class="btn nav-btn guest-only" style="padding:8px 24px">Log In</a>
    <div class="nav-user auth-only" id="nav-user-btn">
      <div class="nav-avatar" id="nav-user-avatar">?</div>
      <span id="nav-user-name"></span>
    </div>
    <div class="nav-dropdown auth-only" id="nav-dropdown">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/profile.html">Profile</a>
      <a href="/messages.html">Messages</a>
      <a href="#" onclick="logout();return false;">Log Out</a>
    </div>
  </div>
</nav>

<main class="page-wrapper" style="background:var(--cream)">
  <div class="container">
    <div class="page-header">
      <h1>Explore Projects</h1>
    </div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search projects...">
      <select id="category-filter">
        <option value="">All Categories</option>
        <option value="hackathon">Hackathon</option>
        <option value="project">Project</option>
        <option value="startup">Startup</option>
        <option value="research">Research</option>
      </select>
    </div>

    <div id="projects-container">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </div>
</main>

<script src="/js/app.js"></script>
<script src="/js/projects.js"></script>
</body>
</html>
