<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — CollabX</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <a href="/projects.html">Projects</a>
    <a href="/create-project.html">Create Project</a>
  </div>
  <a href="/" class="nav-logo">COLLAB<span>X</span></a>
  <div class="nav-right">
    <a href="/messages.html" class="auth-only" style="font-weight:700">Messages</a>
    <a href="/login.html" class="btn nav-btn guest-only" style="padding:8px 24px">Log In</a>
    <div class="nav-user auth-only" id="nav-user-btn">
      <div class="nav-avatar" id="nav-user-avatar">?</div>
      <span id="nav-user-name"></span>
    </div>
    <div class="nav-dropdown auth-only" id="nav-dropdown">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/profile.html">Profile</a>
      <a href="#" onclick="logout();return false;">Log Out</a>
    </div>
  </div>
</nav>

<main class="page-wrapper" style="background:var(--cream)">
  <div class="container project-detail" id="project-content">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</main>

<!-- Apply Modal -->
<div class="modal-overlay" id="apply-modal">
  <div class="modal">
    <h2>Apply to Project</h2>
    <div class="form-group">
      <label for="apply-msg">Why do you want to join? (optional)</label>
      <textarea id="apply-msg" class="form-textarea" rows="4" placeholder="Share your motivation and relevant experience..."></textarea>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-red" id="apply-submit" style="flex:1">Submit Application</button>
      <button class="btn btn-outline" onclick="document.getElementById('apply-modal').classList.remove('show')" style="flex:0">Cancel</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/project-detail.js"></script>
</body>
</html>
