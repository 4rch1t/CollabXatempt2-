<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Project — CollabX</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <a href="/projects.html">Projects</a>
    <a href="/create-project.html" style="color:var(--red)">Create Project</a>
  </div>
  <a href="/" class="nav-logo"><img src="/logo.jpeg" alt="CollabX" class="nav-logo-img"></a>
  <div class="nav-right">
    <a href="/messages.html" style="font-weight:700">Messages</a>
    <div class="nav-user" id="nav-user-btn">
      <div class="nav-avatar" id="nav-user-avatar">?</div>
      <span id="nav-user-name"></span>
    </div>
    <div class="nav-dropdown" id="nav-dropdown">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/profile.html">Profile</a>
      <a href="#" onclick="logout();return false;">Log Out</a>
    </div>
  </div>
</nav>

<main class="page-wrapper" style="background:var(--cream)">
  <div class="container" style="max-width:700px">
    <div class="page-header">
      <h1>Create Project</h1>
    </div>

    <div style="background:var(--white);border:var(--border);border-radius:var(--radius);padding:36px;box-shadow:var(--shadow-sm)">
      <div class="auth-error" id="error"></div>
      <form id="create-form">
        <div class="form-group">
          <label for="title">Project Title</label>
          <input type="text" id="title" class="form-input" placeholder="e.g. AI-Powered Study Planner" required>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" class="form-textarea" rows="5" placeholder="Describe your project idea, goals, and what kind of teammates you're looking for..." required></textarea>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" class="form-select">
            <option value="hackathon">Hackathon</option>
            <option value="project" selected>Project</option>
            <option value="startup">Startup</option>
            <option value="research">Research</option>
          </select>
        </div>
        <div class="form-group">
          <label>Required Skills <span style="font-weight:400;color:#888">(press Enter to add)</span></label>
          <div class="tag-input-wrapper" id="skills-wrapper">
            <input type="text" placeholder="e.g. React, Python, Figma">
          </div>
          <input type="hidden" id="skills-hidden">
        </div>
        <div class="form-group">
          <label for="teamSize">Team Size</label>
          <input type="number" id="teamSize" class="form-input" value="4" min="2" max="20">
        </div>
        <button type="submit" class="btn btn-red" style="width:100%">Create Project →</button>
      </form>
    </div>
  </div>
</main>

<script src="/js/app.js"></script>
<script src="/js/create-project.js"></script>
</body>
</html>
