<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — CollabX</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <a href="/projects.html">Projects</a>
    <a href="/create-project.html">Create Project</a>
  </div>
  <a href="/" class="nav-logo">COLLAB<span>X</span></a>
  <div class="nav-right">
    <a href="/messages.html" style="font-weight:700">Messages</a>
    <div class="nav-user" id="nav-user-btn">
      <div class="nav-avatar" id="nav-user-avatar">?</div>
      <span id="nav-user-name"></span>
    </div>
    <div class="nav-dropdown" id="nav-dropdown">
      <a href="/profile.html">Profile</a>
      <a href="/messages.html">Messages</a>
      <a href="#" onclick="logout();return false;">Log Out</a>
    </div>
  </div>
</nav>

<main class="page-wrapper" style="background:var(--cream)">
  <div class="container">
    <div class="page-header">
      <div>
        <h1 id="greeting">Welcome back!</h1>
        <p style="color:var(--gray)">Here's your CollabX overview</p>
      </div>
      <a href="/create-project.html" class="btn btn-red">+ New Project</a>
    </div>

    <!-- Join with Invite Code -->
    <div class="join-invite-bar">
      <span style="font-weight:700;white-space:nowrap">🔗 Have an invite code?</span>
      <input type="text" id="invite-input" placeholder="Paste code here..." maxlength="20">
      <button class="btn btn-sm btn-red" id="join-invite-btn">Join Team</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="stats">
      <div class="stat-card red"><div class="stat-number" id="stat-owned">0</div><div class="stat-label">Projects Created</div></div>
      <div class="stat-card yellow"><div class="stat-number" id="stat-member">0</div><div class="stat-label">Teams Joined</div></div>
      <div class="stat-card black"><div class="stat-number" id="stat-apps">0</div><div class="stat-label">Applications</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="owned">My Projects</div>
      <div class="tab" data-tab="joined">Teams Joined</div>
      <div class="tab" data-tab="applications">My Applications</div>
    </div>

    <div id="tab-content">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </div>
</main>

<script src="/js/app.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
