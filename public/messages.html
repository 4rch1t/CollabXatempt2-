<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — CollabX</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <a href="/projects.html">Projects</a>
    <a href="/create-project.html">Create Project</a>
  </div>
  <a href="/" class="nav-logo">COLLAB<span>X</span></a>
  <div class="nav-right">
    <a href="/messages.html" style="font-weight:700;color:var(--red)">Messages</a>
    <div class="nav-user" id="nav-user-btn">
      <div class="nav-avatar" id="nav-user-avatar">?</div>
      <span id="nav-user-name"></span>
    </div>
    <div class="nav-dropdown" id="nav-dropdown">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/profile.html">Profile</a>
      <a href="#" onclick="logout();return false;">Log Out</a>
    </div>
  </div>
</nav>

<div class="messages-page">
  <!-- Conversations sidebar -->
  <div class="conversations-panel" id="conversations-panel">
    <div class="conversations-header">
      Messages
      <div style="margin-top:8px">
        <input type="text" id="user-search" class="form-input" placeholder="Search user to message..." style="padding:8px 14px;font-size:0.85rem;border-radius:var(--radius-full)">
      </div>
      <div id="search-results" style="margin-top:4px"></div>
    </div>
    <div id="conversations-list"></div>
  </div>

  <!-- Chat area -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-empty" id="chat-empty">
      <div>
        <div style="font-size:3rem;margin-bottom:12px">💬</div>
        <p>Select a conversation or search<br>for a user to start chatting</p>
      </div>
    </div>
    <div class="chat-header" id="chat-header" style="display:none">
      <div class="nav-avatar" id="chat-avatar" style="width:36px;height:36px;font-size:0.9rem">?</div>
      <span id="chat-name"></span>
      <div class="typing-indicator" id="typing" style="display:none">typing...</div>
    </div>
    <div class="chat-messages" id="chat-messages" style="display:none"></div>
    <div class="chat-input-area" id="chat-input-area" style="display:none">
      <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
      <button class="btn btn-red" id="send-btn">Send</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
<script src="/js/messages.js"></script>
</body>
</html>
